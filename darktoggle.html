<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>
    :root {
        --bg-color: #f4f6f8;
        --card-color: #ffffff;
        --text-color: #333;
        --btn-color: #667eea;
    }

    body.dark {
        --bg-color: #121212;
        --card-color: #1f1f1f;
        --text-color: #f5f5f5;
        --btn-color: #bb86fc;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
        transition: background 0.4s, color 0.4s;
    }

    body {
        background: var(--bg-color);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: var(--card-color);
        padding: 30px;
        width: 350px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        text-align: center;
    }

    h1 {
        color: var(--text-color);
        margin-bottom: 10px;
    }

    p {
        color: var(--text-color);
        margin-bottom: 20px;
    }

    .toggle {
        width: 60px;
        height: 30px;
        background: #ccc;
        border-radius: 30px;
        position: relative;
        cursor: pointer;
        margin: auto;
    }

    .toggle::before {
        content: "";
        position: absolute;
        width: 26px;
        height: 26px;
        background: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: 0.4s;
    }

    body.dark .toggle {
        background: #333;
    }

    body.dark .toggle::before {
        transform: translateX(30px);
        background: #bb86fc;
    }

</style>
</head>

<body>

<div class="card">
    <h1>Dark Mode 🌙</h1>
    <p>Click the toggle to switch theme</p>

    <div class="toggle" onclick="toggleDarkMode()"></div>
</div>

<script  src="toggle.js"></script>

</body>
</html>
